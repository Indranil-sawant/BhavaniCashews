services:
  - type: web
    name: bhavani-cashews
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --log-file -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bhavani-cashews-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

databases:
  - name: bhavani-cashews-db
    plan: free
