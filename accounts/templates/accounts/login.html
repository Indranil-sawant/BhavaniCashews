{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">

        <h1 class="text-3xl font-bold mb-6 text-center">
            Factory Login
        </h1>

        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-100 text-red-600 p-3 rounded mb-4">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-5">

            {% csrf_token %}

            <div>
                <label class="block mb-2 font-medium">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >
            </div>

            <div>
                <label class="block mb-2 font-medium">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-amber-500 hover:bg-amber-600 text-white py-3 rounded-lg font-semibold transition"
            >
                Login
            </button>

        </form>

    </div>

</div>

{% endblock %}
